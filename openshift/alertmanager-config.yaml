# Option 1: Using AlertmanagerConfig (for user-defined projects)
# Apply to openshift-monitoring namespace
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertdemo-webhook
  namespace: openshift-monitoring
  labels:
    alertmanager: main
spec:
  receivers:
    - name: alertdemo-webhook
      webhookConfigs:
        - url: http://alert-webhook.alertdemo.svc.cluster.local:8080/alertwebhook
          sendResolved: true
  route:
    groupBy: ['alertname', 'namespace']
    groupWait: 10s
    groupInterval: 10s
    matchLabels:
      namespace: alertdemo
    receiver: alertdemo-webhook
    repeatInterval: 12h
