---
# Simple Deployment (if you have a pre-built image)
apiVersion: v1
kind: Namespace
metadata:
  name: alertdemo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-webhook
  namespace: alertdemo
  labels:
    app: alert-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-webhook
  template:
    metadata:
      labels:
        app: alert-webhook
    spec:
      containers:
        - name: webhook
          image: image-registry.openshift-image-registry.svc:5000/alertdemo/alert-webhook:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: APP_HOST
              value: "0.0.0.0"
            - name: APP_PORT
              value: "8080"
            - name: APP_USERNAME
              value: "admin"
            - name: APP_PASSWORD
              value: "admin123"
            - name: MAX_ALERTS
              value: "1000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: alert-webhook
  namespace: alertdemo
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: alert-webhook
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: alert-webhook
  namespace: alertdemo
spec:
  to:
    kind: Service
    name: alert-webhook
  tls:
    termination: edge
