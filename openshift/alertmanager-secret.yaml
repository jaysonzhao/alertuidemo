# Create updated Alertmanager config with webhook receiver
# Save as alertmanager-secret.yaml

apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-main
  namespace: openshift-monitoring
stringData:
  alertmanager.yaml: |
    global:
      http_config:
        proxy_from_environment: true
    inhibit_rules:
      - equal:
          - namespace
          - alertname
        source_matchers:
          - severity = critical
        target_matchers:
          - severity =~ warning|info
      - equal:
          - namespace
          - alertname
        source_matchers:
          - severity = warning
        target_matchers:
          - severity = info
    receivers:
      - name: Default
      - name: Watchdog
      - name: Critical
      - name: alertdemo-webhook
        webhook_configs:
          - url: http://alert-webhook.alertdemo.svc.cluster.local:8080/alertwebhook
            send_resolved: true
    route:
      group_by:
        - namespace
      group_interval: 5m
      group_wait: 30s
      receiver: Default
      repeat_interval: 12h
      routes:
        - matchers:
            - alertname = Watchdog
          receiver: Watchdog
        - matchers:
            - severity = critical
          receiver: Critical
        - matchers:
            - namespace = alertdemo
          receiver: alertdemo-webhook
